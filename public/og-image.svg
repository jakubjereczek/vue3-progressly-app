<svg viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Progressly Open Graph Image — 1200×630
    Used for social sharing previews (Twitter, LinkedIn, Slack, etc.)
    To use as og:image, convert to PNG at 1200×630 (screenshot or headless render).

    Geometry (center 600,240 · r=120 · stroke-width=20):
      7 o'clock (120°): (600 - 60, 240 + 103.92) = (540, 343.92)
      5 o'clock  (60°): (600 + 60, 240 + 103.92) = (660, 343.92)
      Arc: M 540 344 A 120 120 0 1 1 660 344  (large-arc=1, sweep=1, 300°)
      Dot: cx=660 cy=344 r=22
  -->

  <!-- Background -->
  <rect width="1200" height="630" fill="#171717"/>

  <!-- Decorative background circles (matches auth page aesthetic) -->
  <circle cx="-60" cy="80"  r="380" fill="white" fill-opacity="0.025"/>
  <circle cx="1260" cy="550" r="300" fill="white" fill-opacity="0.025"/>
  <circle cx="1100" cy="60"  r="200" fill="white" fill-opacity="0.02"/>

  <!-- Progress ring arc -->
  <path
    d="M 540 343.92 A 120 120 0 1 1 660 343.92"
    stroke="white"
    stroke-width="20"
    stroke-linecap="round"
    fill="none"
  />

  <!-- Progress head dot -->
  <circle cx="660" cy="343.92" r="22" fill="white"/>

  <!-- Wordmark -->
  <text
    x="600"
    y="455"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="80"
    font-weight="700"
    fill="white"
    text-anchor="middle"
    letter-spacing="-3"
  >Progressly</text>

  <!-- Tagline -->
  <text
    x="600"
    y="515"
    font-family="system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="26"
    font-weight="400"
    fill="white"
    fill-opacity="0.45"
    text-anchor="middle"
    letter-spacing="0.5"
  >Track your time. Own your day.</text>
</svg>
